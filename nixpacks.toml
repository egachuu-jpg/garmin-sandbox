providers = ["python", "node"]

[phases.setup]
nixPkgs = ["pkgs.python311", "pkgs.python311Packages.pip"]
# curl_cffi's compiled extension needs libstdc++.so.6 at load time; nixLibs
# adds the gcc runtime libs to LD_LIBRARY_PATH.
nixLibs = ["pkgs.stdenv.cc.cc.lib"]

[phases.install]
# Nix's system Python is externally-managed (PEP 668) and lives in the
# immutable /nix/store, so `pip install` can't write to it. Use a venv in a
# writable path instead; PYTHON_BIN (below) points the app at it at runtime.
cmds = [
  "python -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "npm install"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

[variables]
# The Node app spawns the Taxuspt Garmin MCP via this interpreter.
PYTHON_BIN = "/opt/venv/bin/python"
